version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
    ports:
      - "3306:3306"

  app:
    build: ./app
    container_name: flask_app
    depends_on:
      - db
    ports:
      - "5000:5000"

  web:
    build: ./web
    container_name: nginx_web
    depends_on:
      - app
    ports:
      - "80:80"